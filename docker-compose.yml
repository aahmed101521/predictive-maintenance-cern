version: "3.8"

# docker-compose up  →  starts both services
# docker-compose down →  stops and removes containers

services:

  # ── Predictive Maintenance API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdm_api
    ports:
      - "8000:8000"       # API available at http://localhost:8000
    environment:
      - MODELS_DIR=/app/models
    volumes:
      - ./models:/app/models:ro   # mount models read-only (no need to rebuild on model update)
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: pdm_mlflow
    working_dir: /mlflow
    ports:
      - "5000:5000"       # MLflow UI available at http://localhost:5000
    volumes:
      - ./mlruns:/mlflow/mlruns    # persist experiment data on host
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow server
             --host 0.0.0.0
             --port 5000
             --backend-store-uri /mlflow/mlruns
             --default-artifact-root /mlflow/mlruns"
    restart: unless-stopped
